<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>西寧_小工具</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #0d0d12; color: #e4e4e7; padding: 20px; margin: 0; line-height: 1.5; }
        .navbar-container { display: flex; justify-content: center; gap: 8px; margin-bottom: 25px; }
        .nav-button { background-color: #27272a; color: #a1a1aa; border: none; padding: 10px 18px; border-radius: 20px; cursor: pointer; font-size: 14px; font-weight: 500; transition: 0.2s; }
        .nav-button.active { background-color: #3b82f6; color: white; }
        
        .container { max-width: 480px; margin: auto; background: #18181b; padding: 24px; border-radius: 16px; border: 1px solid #27272a; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5); }
        .page { display: none; }
        .page.active { display: block; }

        .section-title { font-size: 14px; color: #71717a; margin: 20px 0 10px; border-bottom: 1px solid #27272a; padding-bottom: 5px; }
        .input-group { margin-bottom: 15px; display: flex; align-items: center; justify-content: space-between; background: #27272a; padding: 12px; border-radius: 10px; }
        .hint { font-size: 12px; color: #f87171; margin-bottom: 10px; display: block; }
        
        input { background: #09090b; border: 1px solid #3f3f46; color: white; padding: 8px; border-radius: 6px; width: 70px; text-align: center; font-size: 16px; }
        input:focus { border-color: #3b82f6; outline: none; }
        .wide-input { width: 120px; }
        
        .ctrl-group { display: flex; align-items: center; gap: 8px; }
        .ctrl-btn { background: #3f3f46; color: white; border: none; width: 32px; height: 32px; border-radius: 6px; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; }
        .ctrl-btn:hover { background: #52525b; }
        
        .calc-btn { width: 100%; padding: 14px; background: #3b82f6; color: white; border: none; border-radius: 10px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 20px; transition: 0.2s; }
        .calc-btn:hover { background: #2563eb; }

        #resultBox { margin-top: 25px; padding: 20px; background: #09090b; border-radius: 12px; border: 1px solid #3b82f6; display: none; }
        #mainResult { font-size: 24px; font-weight: 800; color: #4ade80; text-align: center; margin-bottom: 15px; }
        .log-container { font-family: monospace; font-size: 13px; color: #a1a1aa; white-space: pre-line; border-top: 1px solid #27272a; padding-top: 15px; }
    </style>
</head>
<body>

    <div class="navbar-container">
        <button class="nav-button" onclick="location.reload()">鞋碼轉換</button>
        <button class="nav-button active">薪資計算(PT)</button>
    </div>

    <div class="container">
        <h2 style="text-align: center; margin-top: 0;">薪資計算器</h2>
        
        <div class="input-group">
            <label>每小時薪資 (元)</label>
            <input type="number" id="hourlyWage" class="wide-input" value="196">
        </div>

        <div class="section-title">班別時數 (未扣休息)</div>
        <span class="hint">※ 請輸入班表上的原始時數</span>
        
        <div id="shiftList">
            <div class="input-group"><span>9 小時班</span> <div class="ctrl-group"><button class="ctrl-btn" onclick="adj('h9',-1)">-</button><input type="number" id="h9" value="0"><button class="ctrl-btn" onclick="adj('h9',1)">+</button></div></div>
            <div class="input-group"><span>8 小時班</span> <div class="ctrl-group"><button class="ctrl-btn" onclick="adj('h8',-1)">-</button><input type="number" id="h8" value="0"><button class="ctrl-btn" onclick="adj('h8',1)">+</button></div></div>
            <div class="input-group"><span>5 小時班</span> <div class="ctrl-group"><button class="ctrl-btn" onclick="adj('h5',-1)">-</button><input type="number" id="h5" value="0"><button class="ctrl-btn" onclick="adj('h5',1)">+</button></div></div>
        </div>

        <div id="otherContainer">
            <div class="input-group other-row">
                <input type="number" class="o-h" placeholder="時數" style="width: 60px;" oninput="addNewOther(this)">
                <span>時 / </span>
                <div class="ctrl-group"><button class="ctrl-btn" onclick="adjEl(this,-1)">-</button><input type="number" class="o-c" value="0"><button class="ctrl-btn" onclick="adjEl(this,1)">+</button> 次</div>
            </div>
        </div>

        <div class="section-title">額外加班時數</div>
        <div class="input-group"><span>0-4 小時加成 (x0.34)</span> <div class="ctrl-group"><button class="ctrl-btn" onclick="adj('ot1',-1)">-</button><input type="number" id="ot1" value="0" step="0.5"><button class="ctrl-btn" onclick="adj('ot1',1)">+</button></div></div>
        <div class="input-group"><span>5-8 小時加成 (x0.67)</span> <div class="ctrl-group"><button class="ctrl-btn" onclick="adj('ot2',-1)">-</button><input type="number" id="ot2" value="0" step="0.5"><button class="ctrl-btn" onclick="adj('ot2',1)">+</button></div></div>

        <button class="calc-btn" onclick="runCalculation()">計算實領薪資</button>

        <div id="resultBox">
            <div id="mainResult"></div>
            <div id="logArea" class="log-container"></div>
        </div>
    </div>

    <script>
        const rangeTable = [
            { max: 11100, labor: 277, health: 458 }, { max: 12540, labor: 313, health: 458 },
            { max: 13500, labor: 338, health: 458 }, { max: 15840, labor: 396, health: 458 },
            { max: 16500, labor: 413, health: 458 }, { max: 17280, labor: 432, health: 458 },
            { max: 17880, labor: 447, health: 458 }, { max: 19047, labor: 476, health: 458 },
            { max: 20008, labor: 500, health: 458 }, { max: 21009, labor: 525, health: 458 },
            { max: 22000, labor: 550, health: 458 }, { max: 23100, labor: 577, health: 458 },
            { max: 24000, labor: 600, health: 458 }, { max: 25250, labor: 632, health: 458 },
            { max: 26400, labor: 660, health: 458 }, { max: 27600, labor: 690, health: 458 },
            { max: 28590, labor: 715, health: 458 }, { max: 29500, labor: 738, health: 458 },
            { max: 30300, labor: 758, health: 470 }, { max: 31800, labor: 795, health: 493 },
            { max: 33300, labor: 833, health: 516 }, { max: 34800, labor: 870, health: 540 },
            { max: 36300, labor: 908, health: 563 }, { max: 38200, labor: 955, health: 592 },
            { max: 40100, labor: 1002, health: 622 }, { max: 42000, labor: 1050, health: 651 },
            { max: 43900, labor: 1098, health: 681 }, { max: 999999, labor: 1145, health: 710 }
        ];

        function adj(id, v) { 
            let e = document.getElementById(id);
            e.value = Math.max(0, (parseFloat(e.value) || 0) + v);
        }

        function adjEl(btn, v) {
            let e = btn.parentNode.querySelector('input');
            e.value = Math.max(0, (parseInt(e.value) || 0) + v);
        }

        function addNewOther(input) {
            let rows = document.querySelectorAll('.other-row');
            if (input.value !== "" && input === rows[rows.length-1].querySelector('.o-h')) {
                let cln = rows[rows.length-1].cloneNode(true);
                cln.querySelectorAll('input').forEach(i => i.value = (i.className === 'o-c' ? 0 : ""));
                document.getElementById('otherContainer').appendChild(cln);
            }
        }

        function runCalculation() {
            let wage = parseFloat(document.getElementById('hourlyWage').value) || 0;
            let log = "--- 計算細節 ---\n";
            let totalCleanHours = 0;

            let shifts = [
                { h: 9, c: parseInt(document.getElementById('h9').value) || 0 },
                { h: 8, c: parseInt(document.getElementById('h8').value) || 0 },
                { h: 5, c: parseInt(document.getElementById('h5').value) || 0 }
            ];

            document.querySelectorAll('.other-row').forEach(r => {
                let h = parseFloat(r.querySelector('.o-h').value);
                let c = parseInt(r.querySelector('.o-c').value);
                if(h > 0 && c > 0) shifts.push({h, c});
            });

            shifts.forEach(s => {
                if (s.c <= 0) return;
                let rest = s.h > 8 ? 1 : (s.h > 4 ? 0.5 : 0);
                let clean = s.h - rest;
                totalCleanHours += (clean * s.c);
                log += `📍 ${s.h}時班: (${s.h} - 休息${rest}) x ${s.c}次 = ${clean * s.c}時\n`;
            });

            let basePay = totalCleanHours * wage;
            log += `💰 基本薪資: ${totalCleanHours}時 x ${wage}元 = ${Math.round(basePay)}元\n`;

            let ot1 = (parseFloat(document.getElementById('ot1').value) || 0) * (wage * 0.34);
            let ot2 = (parseFloat(document.getElementById('ot2').value) || 0) * (wage * 0.67);
            let totalPay = Math.round(basePay + ot1 + ot2);
            
            if(ot1+ot2 > 0) log += `➕ 加班津貼: ${Math.round(ot1+ot2)}元\n`;
            log += `合計總薪資: ${totalPay}元\n`;

            let ins = rangeTable.find(i => totalPay <= i.max) || rangeTable[rangeTable.length-1];
            let final = totalPay - ins.labor - ins.health;

            log += `➖ 勞保扣除: ${ins.labor}元 (級距≤${ins.max})\n`;
            log += `➖ 健保扣除: ${ins.health}元\n`;
            log += `----------------\n實領金額: ${totalPay} - ${ins.labor} - ${ins.health} = ${final}元`;

            document.getElementById('mainResult').innerHTML = `實領薪資: <span style="color:#fff">$${final.toLocaleString()}</span>`;
            document.getElementById('logArea').innerText = log;
            document.getElementById('resultBox').style.display = "block";
        }
    </script>
</body>
</html>
